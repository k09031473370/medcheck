<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面 | MedCheck Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--navy:#0F2847;--teal:#0A7B6C;--teal-light:#12A090;--teal-pale:#E6F5F3;--slate:#3D5A73;--mist:#F0F4F8;--white:#FFFFFF;--gray:#8299AB;--border:#D4E4EC;--error:#D94F4F;--warn:#E8891A;--sidebar:240px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--mist);color:var(--navy);display:flex;min-height:100vh;}
.login-wrap{position:fixed;inset:0;background:linear-gradient(135deg,var(--navy) 0%,#1A3D5C 60%,var(--teal) 100%);display:flex;align-items:center;justify-content:center;z-index:999;}
.login-box{background:white;border-radius:20px;padding:48px 40px;width:360px;box-shadow:0 24px 60px rgba(0,0,0,.25);text-align:center;}
.login-box .logo-icon{width:56px;height:56px;background:var(--teal);border-radius:14px;display:flex;align-items:center;justify-content:center;color:white;font-size:28px;margin:0 auto 16px;}
.login-box h1{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:4px;}
.login-box p{font-size:12px;color:var(--gray);margin-bottom:28px;}
.login-field{text-align:left;margin-bottom:16px;}
.login-field label{display:block;font-size:12px;font-weight:700;color:var(--slate);margin-bottom:6px;}
.login-field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.login-field input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:13px;background:var(--teal);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px;}
.login-btn:hover{background:var(--teal-light);}
.login-err{color:var(--error);font-size:12px;margin-top:8px;display:none;}
.sidebar{width:var(--sidebar);background:var(--navy);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;}
.sb-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo .top{display:flex;align-items:center;gap:10px;}
.sb-logo .icon{width:34px;height:34px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;}
.sb-logo .name{font-family:'DM Serif Display',serif;font-size:18px;color:white;}
.sb-logo .name span{color:var(--teal-light);}
.sb-logo .sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:6px;letter-spacing:.08em;text-transform:uppercase;}
.sb-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.sb-section{font-size:10px;color:rgba(255,255,255,.3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:8px 8px 4px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(255,255,255,.65);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:2px;}
.sb-item:hover{background:rgba(255,255,255,.07);color:white;}
.sb-item.active{background:var(--teal);color:white;}
.sb-item .icon{font-size:16px;width:22px;text-align:center;}
.sb-footer{padding:16px;border-top:1px solid rgba(255,255,255,.08);}
.sb-footer button{width:100%;padding:9px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.6);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.main-wrap{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:white;padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
.topbar-title{font-size:18px;font-weight:700;}
.refresh-btn{padding:7px 14px;background:var(--teal-pale);border:1px solid rgba(10,123,108,.3);border-radius:7px;color:var(--teal);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.content{padding:28px 32px;flex:1;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.stat-card{background:white;border:1px solid var(--border);border-radius:14px;padding:20px;}
.stat-label{font-size:11px;color:var(--gray);font-weight:700;text-transform:uppercase;margin-bottom:8px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:32px;line-height:1;}
.stat-sub{font-size:11px;color:var(--gray);margin-top:4px;}
.stat-card.teal .stat-value{color:var(--teal);}
.stat-card.warn .stat-value{color:var(--warn);}
.stat-card.error .stat-value{color:var(--error);}
.cal-view{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.cal-toolbar{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.cal-nav-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:7px;background:white;cursor:pointer;font-size:16px;color:var(--slate);}
.cal-current-label{font-size:16px;font-weight:700;min-width:160px;text-align:center;}
.cal-today-btn{padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:white;cursor:pointer;font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;color:var(--slate);}
.month-grid-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.month-head-cell{padding:8px;text-align:center;font-size:11px;font-weight:700;color:var(--gray);}
.month-head-cell:first-child{color:var(--error);}
.month-head-cell:last-child{color:#4F7CD9;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-cell{min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;}
.month-cell:nth-child(7n){border-right:none;}
.month-cell.other-month{background:#FAFBFC;}
.month-cell.today-cell{background:#F0FBF9;}
.mc-num{font-size:12px;font-weight:700;color:var(--slate);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:4px;}
.month-cell.today-cell .mc-num{background:var(--teal);color:white;}
.mc-event{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mc-event.ev-confirmed{background:#E6F5F3;color:var(--teal);}
.mc-event.ev-completed{background:#EEF4FF;color:#4F7CD9;}
.mc-event.ev-cancelled{background:#FDEAEA;color:var(--error);}
.mc-event.ev-noshow{background:#FFF3E0;color:var(--warn);}
.mc-avail{margin-top:4px;border-top:1px solid var(--border);padding-top:4px;}
.avail-bar{height:4px;border-radius:2px;background:var(--border);overflow:hidden;margin-bottom:2px;}
.avail-bar-fill{height:100%;border-radius:2px;}
.avail-label{font-size:9px;color:var(--gray);}
.table-card{background:white;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.table-header h3{font-size:14px;font-weight:700;}
.table-count{font-size:12px;color:var(--gray);}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--gray);background:var(--mist);text-transform:uppercase;border-bottom:1px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);}
tbody td{padding:12px 16px;font-size:13px;}
.td-code{font-family:'DM Serif Display',serif;font-size:14px;color:var(--teal);}
.td-name{font-weight:700;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.status-badge::before{content:'';width:6px;height:6px;border-radius:50%;}
.status-confirmed{background:#E6F5F3;color:var(--teal);}.status-confirmed::before{background:var(--teal);}
.status-cancelled{background:#FDEAEA;color:var(--error);}.status-cancelled::before{background:var(--error);}
.status-completed{background:#EEF4FF;color:#4F7CD9;}.status-completed::before{background:#4F7CD9;}
.status-noshow{background:#FFF3E0;color:var(--warn);}.status-noshow::before{background:var(--warn);}
.filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-input{flex:1;min-width:200px;border:1.5px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.filter-select{border:1.5px solid var(--border);border-radius:8px;padding:9px 32px 9px 12px;font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;cursor:pointer;background:white;}
.act-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;border:1.5px solid;background:transparent;}
.act-complete{border-color:var(--teal);color:var(--teal);}
.act-cancel{border-color:var(--error);color:var(--error);}
.act-noshow{border-color:var(--warn);color:var(--warn);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:16px;width:540px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:16px;font-weight:700;}
.modal-close{width:32px;height:32px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;font-size:18px;color:var(--gray);}
.modal-body{padding:24px;}
.detail-row{display:flex;border-bottom:1px solid var(--border);padding:10px 0;}
.detail-label{width:140px;font-size:12px;font-weight:700;color:var(--gray);}
.detail-value{font-size:14px;flex:1;}
.modal-actions{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;}
.plans-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.plan-mgmt-card{background:white;border:1.5px solid var(--border);border-radius:12px;padding:20px;}
.plan-mgmt-card.inactive{opacity:.5;}
.plan-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px;}
.plan-badge.active{background:var(--teal-pale);color:var(--teal);}
.plan-badge.inactive{background:#F5F5F5;color:var(--gray);}
.plan-mgmt-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.plan-mgmt-desc{font-size:12px;color:var(--gray);line-height:1.6;margin-bottom:10px;}
.plan-mgmt-price{font-family:'DM Serif Display',serif;font-size:22px;color:var(--teal);}
.plan-capacity{font-size:12px;color:var(--slate);margin-top:6px;}
.plan-capacity span{font-weight:700;color:var(--navy);}
.plan-mgmt-actions{display:flex;gap:8px;margin-top:14px;}
.btn-edit{padding:6px 14px;background:var(--teal-pale);border:1px solid rgba(10,123,108,.3);border-radius:7px;color:var(--teal);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.btn-toggle-plan{padding:6px 14px;background:#F5F5F5;border:1px solid var(--border);border-radius:7px;color:var(--gray);font-size:12px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.add-plan-btn{width:100%;padding:14px;background:var(--teal);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-bottom:20px;}
.plan-form{display:flex;flex-direction:column;gap:14px;}
.plan-form label{font-size:12px;font-weight:700;color:var(--slate);margin-bottom:4px;display:block;}
.plan-form input,.plan-form textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none;}
.config-notice{background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:14px 18px;margin-bottom:20px;font-size:13px;color:#5D4037;}
.view-section{display:none;}
.view-section.active{display:block;}
</style>
</head>

<script>
var isConfigured = CONFIG.SUPABASE_URL !== 'YOUR_SUPABASE_URL';
var sbClient = null;
if(isConfigured) sbClient = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

var allBookings = [];
var allPlans = [];
var totalDailyCap = parseInt(localStorage.getItem('totalDailyCap')) || 60;
var TODAY = new Date(); TODAY.setHours(0,0,0,0);
var TODAY_STR = TODAY.toISOString().slice(0,10);
var DAYS = ['日','月','火','水','木','金','土'];
var calDate = new Date();

function doLogin(){
  if(document.getElementById('pwInput').value === CONFIG.ADMIN_PASSWORD){
    document.getElementById('loginWrap').style.display='none';
    init();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

function init(){
  if(!isConfigured) document.getElementById('configNotice').style.display='block';
  loadAll();
}

async function loadAll(){
  if(isConfigured && sbClient){
    try {
      var r1 = await sbClient.from('bookings').select('*').order('booking_date',{ascending:false});
      if(r1.data) allBookings = r1.data;
      var r2 = await sbClient.from('plans').select('*').order('sort_order');
      if(r2.data) allPlans = r2.data;
    } catch(e){ console.error(e); }
  } else {
    allBookings = getDemoBookings();
    allPlans = getDemoPlans();
  }
  updateStats();
  renderCalendar();
  renderBookingsList();
  renderToday();
  renderPlans();
}

function updateStats(){
  document.getElementById('st-total').textContent = allBookings.length;
  document.getElementById('st-today').textContent = allBookings.filter(function(b){return b.booking_date===TODAY_STR;}).length;
  document.getElementById('st-pending').textContent = allBookings.filter(function(b){return b.status==='confirmed' && b.booking_date>=TODAY_STR;}).length;
  document.getElementById('st-cancel').textContent = allBookings.filter(function(b){return b.status==='cancelled';}).length;
}

function calNav(dir){ calDate.setMonth(calDate.getMonth()+dir); renderCalendar(); }
function calGoToday(){ calDate = new Date(); renderCalendar(); }

function renderCalendar(){
  var y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calLabel').textContent = y+'年 '+(m+1)+'月';
  var bMap = {};
  allBookings.forEach(function(b){
    if(!bMap[b.booking_date]) bMap[b.booking_date] = {confirmed:0, list:[]};
    if(b.status==='confirmed') bMap[b.booking_date].confirmed++;
    bMap[b.booking_date].list.push(b);
  });
  var firstDay = new Date(y,m,1).getDay();
  var daysInMonth = new Date(y,m+1,0).getDate();
  var html = '<div class="month-grid-head">';
  DAYS.forEach(function(d){ html += '<div class="month-head-cell">'+d+'</div>'; });
  html += '</div><div class="month-grid">';
  for(var i=0;i<firstDay;i++){ html += '<div class="month-cell other-month"></div>'; }
  for(var d=1;d<=daysInMonth;d++){
    var dateStr = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday = dateStr===TODAY_STR;
    var info = bMap[dateStr];
    var used = info ? info.confirmed : 0;
    var free = Math.max(0, totalDailyCap - used);
    var pct = Math.min(100, Math.round(used/totalDailyCap*100));
    var barColor = pct>=100?'#D94F4F':pct>=70?'#E8891A':'#0A7B6C';
    html += '<div class="month-cell'+(isToday?' today-cell':'')+'">';
    html += '<div class="mc-num">'+d+'</div>';
    if(info){
      info.list.slice(0,2).forEach(function(b){
        html += '<div class="mc-event ev-'+b.status+'">'+b.booking_time+' '+b.last_name+'</div>';
      });
      if(info.list.length>2) html += '<div style="font-size:10px;color:var(--gray)">他'+(info.list.length-2)+'件</div>';
    }
    html += '<div class="mc-avail"><div class="avail-bar"><div class="avail-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
    html += '<div class="avail-label">'+(free>0?'空き '+free+'名':'満員')+' / 上限'+totalDailyCap+'名</div></div>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('calBody').innerHTML = html;
}

function renderBookingsList(){
  var search = (document.getElementById('searchInput').value||'').toLowerCase();
  var status = document.getElementById('statusFilter').value;
  var list = allBookings.filter(function(b){
    if(search){
      var fn = (b.last_name+b.first_name).toLowerCase();
      if(!fn.includes(search) && !(b.booking_code||'').toLowerCase().includes(search)) return false;
    }
    if(status && b.status!==status) return false;
    return true;
  });
  document.getElementById('tableCount').textContent = list.length+'件';
  var sm = {confirmed:'予約確定',completed:'受診済み',cancelled:'キャンセル',noshow:'無断欠席'};
  var tbody = document.getElementById('bookingsTbody');
  if(list.length===0){ tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray)">予約がありません</td></tr>'; return; }
  var html = '';
  list.forEach(function(b){
    html += '<tr>';
    html += '<td><div class="td-code">'+(b.booking_code||'-')+'</div></td>';
    html += '<td><div class="td-name">'+b.last_name+' '+b.first_name+'</div></td>';
    html += '<td>'+b.plan_name+'</td>';
    html += '<td>'+formatDate(b.booking_date)+' '+b.booking_time+'</td>';
    html += '<td><span class="status-badge status-'+b.status+'">'+(sm[b.status]||b.status)+'</span></td>';
    html += '<td><button class="act-btn" onclick="openDetail(\''+(b.id||b.booking_code)+'\')">詳細</button></td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function renderToday(){
  var list = allBookings.filter(function(b){return b.booking_date===TODAY_STR;}).sort(function(a,b){return a.booking_time.localeCompare(b.booking_time);});
  document.getElementById('todayCount').textContent = list.length+'件';
  var sm = {confirmed:'予約確定',completed:'受診済み',cancelled:'キャンセル',noshow:'無断欠席'};
  var tbody = document.getElementById('todayTbody');
  if(list.length===0){ tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--gray)">本日の予約はありません</td></tr>'; return; }
  var html='';
  list.forEach(function(b){
    html += '<tr>';
    html += '<td style="font-family:DM Serif Display,serif;font-size:18px;color:var(--teal)">'+b.booking_time+'</td>';
    html += '<td><div class="td-name">'+b.last_name+' '+b.first_name+'</div></td>';
    html += '<td>'+b.plan_name+'</td>';
    html += '<td><span class="status-badge status-'+b.status+'">'+(sm[b.status]||b.status)+'</span></td>';
    html += '<td><button class="act-btn" onclick="openDetail(\''+(b.id||b.booking_code)+'\')">詳細</button></td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
}

function renderPlans(){
  var grid = document.getElementById('plansGrid');
  var html = '';
  allPlans.forEach(function(p){
    html += '<div class="plan-mgmt-card'+(p.is_active?'':' inactive')+'">';
    html += '<div class="plan-badge '+(p.is_active?'active':'inactive')+'">'+(p.is_active?'公開中':'非公開')+'</div>';
    html += '<div class="plan-mgmt-name">'+p.name+'</div>';
    html += '<div class="plan-mgmt-desc">'+(p.description||'')+'</div>';
    html += '<div class="plan-mgmt-price">¥'+Number(p.price).toLocaleString()+'</div>';
    html += '<div class="plan-capacity">1日の受入上限：<span>'+(p.daily_capacity||'未設定')+'</span>名</div>';
    html += '<div class="plan-mgmt-actions">';
    html += '<button class="btn-edit" onclick="openPlanModal(\''+p.id+'\')">編集</button>';
    html += '<button class="btn-toggle-plan" onclick="togglePlan(\''+p.id+'\','+p.is_active+')">'+(p.is_active?'非公開にする':'公開する')+'</button>';
    html += '</div></div>';
  });
  html += '<div class="plan-mgmt-card" style="border:2px dashed var(--teal);background:var(--teal-pale)">';
  html += '<div class="plan-mgmt-name" style="color:var(--teal)">全体上限設定</div>';
  html += '<div class="plan-mgmt-desc">1日のトータル受入上限</div>';
  html += '<div class="plan-capacity">現在の上限：<span>'+totalDailyCap+'</span>名</div>';
  html += '<div class="plan-mgmt-actions"><button class="btn-edit" onclick="editTotalCap()">変更する</button></div>';
  html += '</div>';
  grid.innerHTML = html;
}

function editTotalCap(){
  var v = prompt('1日のトータル受入上限（名）:', totalDailyCap);
  if(v && !isNaN(parseInt(v))){
    totalDailyCap = parseInt(v);
    localStorage.setItem('totalDailyCap', totalDailyCap);
    renderPlans();
    renderCalendar();
  }
}

function openPlanModal(id){
  var p = id ? allPlans.find(function(x){return x.id===id;}) : null;
  document.getElementById('planModalTitle').textContent = p ? 'コースを編集' : 'コースを追加';
  document.getElementById('planId').value = p ? p.id : '';
  document.getElementById('planName').value = p ? p.name : '';
  document.getElementById('planPrice').value = p ? p.price : '';
  document.getElementById('planDesc').value = p ? (p.description||'') : '';
  document.getElementById('planOrder').value = p ? p.sort_order : allPlans.length+1;
  document.getElementById('planCapacity').value = p ? (p.daily_capacity||'') : '';
  document.getElementById('planModalOverlay').classList.add('show');
}
function closePlanModal(){ document.getElementById('planModalOverlay').classList.remove('show'); }

async function savePlan(){
  var id = document.getElementById('planId').value;
  var name = document.getElementById('planName').value.trim();
  var price = parseInt(document.getElementById('planPrice').value);
  var description = document.getElementById('planDesc').value.trim();
  var sort_order = parseInt(document.getElementById('planOrder').value)||1;
  var cap = document.getElementById('planCapacity').value;
  var daily_capacity = cap ? parseInt(cap) : null;
  if(!name||!price){ alert('コース名と料金は必須です'); return; }
  var payload = {name:name, price:price, description:description, sort_order:sort_order, is_active:true, daily_capacity:daily_capacity};
  if(isConfigured && sbClient){
    if(id){ await sbClient.from('plans').update(payload).eq('id',id); }
    else { await sbClient.from('plans').insert([payload]); }
  } else {
    if(id){ var pp=allPlans.find(function(x){return x.id===id;}); if(pp) Object.assign(pp,payload); }
    else allPlans.push(Object.assign({id:Date.now().toString()},payload));
  }
  closePlanModal();
  loadAll();
}

async function togglePlan(id, current){
  if(!confirm(current?'このコースを非公開にしますか？':'このコースを公開しますか？')) return;
  if(isConfigured && sbClient){
    await sbClient.from('plans').update({is_active:!current}).eq('id',id);
  } else {
    var p=allPlans.find(function(x){return x.id===id;}); if(p) p.is_active=!current;
  }
  loadAll();
}

function openDetail(id){
  var b = allBookings.find(function(x){return x.id===id||x.booking_code===id;});
  if(!b) return;
  var sm = {confirmed:'予約確定',completed:'受診済み',cancelled:'キャンセル',noshow:'無断欠席'};
  document.getElementById('modalTitle').textContent = '予約詳細';
  var html = '';
  html += '<div class="detail-row"><div class="detail-label">予約番号</div><div class="detail-value" style="font-family:DM Serif Display,serif;color:var(--teal);font-size:18px">'+(b.booking_code||'-')+'</div></div>';
  html += '<div class="detail-row"><div class="detail-label">ステータス</div><div class="detail-value"><span class="status-badge status-'+b.status+'">'+sm[b.status]+'</span></div></div>';
  html += '<div class="detail-row"><div class="detail-label">コース</div><div class="detail-value">'+b.plan_name+'<br>¥'+Number(b.plan_price).toLocaleString()+'</div></div>';
  html += '<div class="detail-row"><div class="detail-label">受診日時</div><div class="detail-value">'+formatDate(b.booking_date)+' '+b.booking_time+'</div></div>';
  html += '<div class="detail-row"><div class="detail-label">お名前</div><div class="detail-value">'+b.last_name+' '+b.first_name+'</div></div>';
  html += '<div class="detail-row"><div class="detail-label">電話</div><div class="detail-value">'+(b.tel||'-')+'</div></div>';
  html += '<div class="detail-row"><div class="detail-label">メール</div><div class="detail-value">'+(b.email||'-')+'</div></div>';
  document.getElementById('modalBody').innerHTML = html;
  var actions = '';
  if(b.status==='confirmed'){
    actions += '<button class="act-btn act-complete" onclick="updateStatus(\''+(b.id||b.booking_code)+'\',\'completed\')">受診済み</button>';
    actions += '<button class="act-btn act-noshow" onclick="updateStatus(\''+(b.id||b.booking_code)+'\',\'noshow\')">無断欠席</button>';
    actions += '<button class="act-btn act-cancel" onclick="updateStatus(\''+(b.id||b.booking_code)+'\',\'cancelled\')">キャンセル</button>';
  }
  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

async function updateStatus(id, newStatus){
  var labels = {completed:'受診済み',cancelled:'キャンセル',noshow:'無断欠席'};
  if(!confirm('「'+labels[newStatus]+'」に変更しますか？')) return;
  if(isConfigured && sbClient){
    await sbClient.from('bookings').update({status:newStatus}).eq('id',id);
  }
  var b = allBookings.find(function(x){return x.id===id||x.booking_code===id;});
  if(b) b.status = newStatus;
  closeModal();
  loadAll();
}

function switchView(v, el){
  document.querySelectorAll('.sb-item').forEach(function(e){e.classList.remove('active');});
  if(el) el.classList.add('active');
  document.querySelectorAll('.view-section').forEach(function(s){s.classList.remove('active');});
  document.getElementById('sec-'+v).classList.add('active');
  var titles = {calendar:'カレンダー',bookings:'予約一覧',today:'本日の予約',plans:'コース管理'};
  document.getElementById('topbarTitle').textContent = titles[v];
}

function formatDate(s){
  if(!s) return '-';
  var d = new Date(s+'T00:00:00');
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}
